services:
  postgres:
    image: postgres:16
    container_name: project-cb
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: project-cb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d project-cb"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
